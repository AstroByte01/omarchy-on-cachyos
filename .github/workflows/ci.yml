name: CI

on:
  push:
  pull_request:
  schedule:
    # Weekly: catches upstream Omarchy drift without repo activity.
    - cron: '17 6 * * 1'
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: shellcheck
        run: shellcheck --severity=warning bin/*.sh tests/*.sh

  cachyos-package-compatibility:
    runs-on: ubuntu-latest
    container: archlinux:base
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: cachyos-extra-v3
            repo_path: x86_64_v3
          - repo: cachyos-extra-v4
            repo_path: x86_64_v4
          - repo: cachyos-extra-znver4
            repo_path: x86_64_v4
    env:
      CACHYOS_REPO: ${{ matrix.repo }}
      CACHYOS_REPO_PATH: ${{ matrix.repo_path }}
    steps:
      - name: Install tooling
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm git sudo curl fakeroot gawk

      - uses: actions/checkout@v5

      - name: Configure isolated CachyOS metadata source
        run: |
          cat > /tmp/cachyos-pacman.conf <<EOF
          [options]
          Architecture = x86_64
          SigLevel = Never

          [$CACHYOS_REPO]
          Server = https://cdn77.cachyos.org/repo/$CACHYOS_REPO_PATH/\$repo
          EOF

      - name: Reject unverified Hyprland/Aquamarine drift
        run: |
          set -euo pipefail
          source ./bin/install-omarchy-on-cachyos.sh
          PACMAN_CONF_PATH=/tmp/cachyos-pacman.conf
          is_cachyos() { return 0; }
          check_fresh_hyprland_aquamarine_alignment

  refs:
    # Mirrors the fetch menu: the 5 newest upstream tags, plus the dev branch.
    # New upstream releases enter the matrix automatically.
    runs-on: ubuntu-latest
    outputs:
      refs: ${{ steps.list.outputs.refs }}
    steps:
      - name: List supported Omarchy refs
        id: list
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tags < <(git ls-remote --tags --refs https://github.com/basecamp/omarchy \
            | awk -F/ '{print $3}' | sort -rV)
          if [ "${#tags[@]}" -lt 5 ]; then
            echo "Expected at least 5 upstream tags, got ${#tags[@]}: ${tags[*]-none}"
            exit 1
          fi
          refs=$(printf '%s\n' "${tags[@]:0:5}" dev | jq -R . | jq -sc .)
          echo "refs=$refs" >> "$GITHUB_OUTPUT"
          echo "Testing refs: $refs"

  smoke:
    needs: refs
    runs-on: ubuntu-latest
    container: archlinux:base
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        ref: ${{ fromJSON(needs.refs.outputs.refs) }}
        profile: [upstream, th3rig]
    env:
      # Passed via env, not inline interpolation: upstream tag names are
      # third-party input and must not be parsed by the shell.
      OMARCHY_CI_REF: ${{ matrix.ref }}
      OMARCHY_CI_PROFILE: ${{ matrix.profile }}
    steps:
      - name: Install tooling
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm git sudo curl fakeroot gawk diffutils jq

      - uses: actions/checkout@v5

      - name: Prepare-only patch run (drift gate)
        run: ./bin/install-omarchy-on-cachyos.sh --ref "$OMARCHY_CI_REF" --profile "$OMARCHY_CI_PROFILE" --prepare-only --no-auto-login --network-iwd

      - name: Re-run on the same tree (idempotency gate)
        run: |
          cp -a omarchy /tmp/run1
          OMARCHY_ON_EXISTING=keep ./bin/install-omarchy-on-cachyos.sh --ref "$OMARCHY_CI_REF" --profile "$OMARCHY_CI_PROFILE" --prepare-only --no-auto-login --network-iwd
          diff -ru /tmp/run1 omarchy

      - name: Independent post-state checks
        # Explicit exit-1 forms: under 'bash -e' a failing '! grep' pipeline
        # does NOT abort the step (errexit exempts !-prefixed pipelines).
        run: |
          absent() {
            [ -f "$2" ] || { echo "MISSING FILE: $2"; exit 1; }
            if grep -qE "$1" "$2"; then echo "FORBIDDEN pattern '$1' found in $2"; exit 1; fi
          }
          present() {
            grep -qE "$1" "$2" || { echo "EXPECTED pattern '$1' missing from $2"; exit 1; }
          }
          absent  'hibernation\.sh'      omarchy/install/login/all.sh
          absent  'plymouth\.sh'         omarchy/install/login/all.sh
          absent  'limine-snapper\.sh'   omarchy/install/login/all.sh
          absent  'preflight/pacman\.sh' omarchy/install/preflight/all.sh
          absent  'preflight/disable-mkinitcpio\.sh' omarchy/install/preflight/all.sh
          absent  'cachyos-release'      omarchy/install/preflight/guard.sh
          absent  '^tldr$'               omarchy/install/omarchy-base.packages
          absent  '^ln -s |ln -sffn'     omarchy/install/config/omarchy-ai-skill.sh
          present 'ln -sfn'              omarchy/install/config/omarchy-ai-skill.sh
          present 'wifi\.backend=iwd'    omarchy/install/config/hardware/network.sh
          present 'CachyOS walker repo pin'  omarchy/install/config/walker-elephant.sh
          present 'Minimal SDDM integration' omarchy/install/login/sddm.sh
          present 'NVIDIA configuration for Omarchy on CachyOS' omarchy/install/config/hardware/nvidia.sh
          present 'CachyOS Chromium profile preservation' omarchy/install/config/config.sh
          present 'jq -s' omarchy/install/config/cachyos-chromium-preferences.sh
          present 'post-install/cachyos-mkinitcpio-hooks\.sh' omarchy/install/post-install/all.sh
          present 'Regenerating initramfs' omarchy/install/post-install/cachyos-mkinitcpio-hooks.sh
          present 'Keeping active .*hook' omarchy/install/post-install/cachyos-mkinitcpio-hooks.sh
          absent  '^[[:space:]]*exit 0' omarchy/install/post-install/cachyos-mkinitcpio-hooks.sh
          present 'SigLevel = Required DatabaseOptional TrustedOnly' bin/install-omarchy-on-cachyos.sh
          if [ "$OMARCHY_CI_PROFILE" = "th3rig" ]; then
            present '^ghostty$' omarchy/install/omarchy-base.packages
            if [ -f omarchy/default/xdg-terminal-exec/hyprland-xdg-terminals.list ]; then
              terminal_defaults=omarchy/default/xdg-terminal-exec/hyprland-xdg-terminals.list
            elif [ -f omarchy/config/xdg-terminals.list ]; then
              terminal_defaults=omarchy/config/xdg-terminals.list
            else
              echo "MISSING terminal defaults file"
              exit 1
            fi
            present '^com\.mitchellh\.ghostty\.desktop$' "$terminal_defaults"
          else
            upstream_packages=$(git -C omarchy show HEAD:install/omarchy-base.packages)
            if ! grep -qxF ghostty <<< "$upstream_packages"; then
              absent '^ghostty$' omarchy/install/omarchy-base.packages
            fi
          fi
          echo "All post-state checks passed."

      - name: Execute installer regression paths
        run: ./tests/installer-regressions.sh omarchy

      - name: Verify th3rig to upstream profile rollback
        if: matrix.profile == 'th3rig'
        run: |
          OMARCHY_ON_EXISTING=keep ./bin/install-omarchy-on-cachyos.sh --ref "$OMARCHY_CI_REF" --profile upstream --prepare-only --no-auto-login --network-iwd

          upstream_packages=$(git -C omarchy show HEAD:install/omarchy-base.packages)
          if ! grep -qxF ghostty <<< "$upstream_packages"; then
            if grep -qxF ghostty omarchy/install/omarchy-base.packages; then
              echo "Ghostty overlay package remained after switching to upstream"
              exit 1
            fi
          fi

          if [ -f omarchy/default/xdg-terminal-exec/hyprland-xdg-terminals.list ]; then
            terminal_defaults=default/xdg-terminal-exec/hyprland-xdg-terminals.list
          else
            terminal_defaults=config/xdg-terminals.list
          fi
          git -C omarchy diff --exit-code -- "$terminal_defaults"
